<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            background: transparent; 
            color: #ffffff; 
            font-family: sans-serif; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden;
        }

        .wrapper {
            position: relative;
            width: 240px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* MAIN BOX */
        .main-box {
            width: 100%;
            background: #121212;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            gap: 6px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .header { color: #00ffff; font-weight: bold; text-align: center; font-size: 14px; margin-bottom: 5px; text-shadow: 0 0 5px #00ffff; }
        input, textarea { width: 100%; background: #1e1e1e; border: 1px solid #333; color: #00ff00; padding: 10px; border-radius: 6px; font-size: 11px; }

        .btn-row { display: flex; gap: 5px; }
        
        /* BUTTON STYLE NA MAY FEEDBACK */
        button { 
            flex: 1; background: #2a2a2a; color: white; border: 1px solid #444; 
            padding: 10px; border-radius: 6px; cursor: pointer; font-size: 11px; 
            font-weight: bold; transition: 0.1s; 
        }
        button:active { transform: scale(0.95); background: #444; } /* Lilitaw na napindot */

        .inject-btn { 
            background: #00ffff; color: #000; border: none; padding: 12px; 
            font-weight: bold; border-radius: 8px; margin-top: 5px; 
        }
        .inject-btn:active { background: #00cccc; transform: scale(0.97); }

        /* LIST POPUP OVERLAY */
        .list-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #121212; border: 2px solid #00ffff;
            border-radius: 12px; z-index: 100; display: none;
            padding: 10px; flex-direction: column;
        }

        .list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .list-title { color: #00ffff; font-size: 12px; font-weight: bold; }
        
        .close-btn { background: #ff4444; color: white; border: none; width: 25px; height: 25px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        .scroll-area { flex: 1; overflow-y: auto; }

        .script-item { 
            background: #1a1a1a; padding: 8px; margin-bottom: 6px; border-radius: 6px; 
            display: flex; justify-content: space-between; align-items: center; border-left: 3px solid #00ffff;
        }

        .item-name { font-size: 10px; color: #bbb; max-width: 60px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        /* MALALAKING EXE AT DEL BUTTONS */
        .item-btns { display: flex; gap: 4px; }
        .item-btns button { width: 55px; padding: 8px 0; border: none; font-size: 10px; }
        .exe { background: #00ff00; color: #000; }
        .del { background: #ff4444; color: #fff; }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #00ffff; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="main-box">
            <div class="header">ROBLOX __ INJECTOR</div>
            <input type="text" id="nInput" placeholder="SCRIPT NAME">
            <textarea id="cInput" rows="2" placeholder="PASTE LUA/LINK"></textarea>
            <div class="btn-row">
                <button type="button" onclick="save()">SAVE</button>
                <button type="button" onclick="showList()">LIST</button>
            </div>
            <button type="button" class="inject-btn" onclick="execute(document.getElementById('cInput').value)">INITIALIZE INJECTION</button>
        </div>

        <div class="list-overlay" id="listMenu">
            <div class="list-header">
                <span class="list-title">SAVED LIST</span>
                <button class="close-btn" onclick="hideList()">X</button>
            </div>
            <div class="scroll-area" id="listArea"></div>
        </div>
    </div>

    <script>
        let storage = JSON.parse(localStorage.getItem('nico_pro_db') || '[]');

        function showList() {
            render();
            document.getElementById('listMenu').style.display = "flex";
        }

        function hideList() {
            document.getElementById('listMenu').style.display = "none";
        }

        function render() {
            const area = document.getElementById('listArea');
            area.innerHTML = storage.length ? '' : '<div style="text-align:center;font-size:10px;color:#555;margin-top:20px;">No Saved Scripts</div>';
            storage.forEach((item, i) => {
                area.innerHTML += `<div class="script-item">
                    <span class="item-name">${item.n}</span>
                    <div class="item-btns">
                        <button class="exe" onclick="execute(\`${item.c}\`)">EXE</button>
                        <button class="del" onclick="remove(${i})">DEL</button>
                    </div></div>`;
            });
        }

        function save() {
            const n = document.getElementById('nInput');
            const c = document.getElementById('cInput');
            if(!n.value || !c.value) return;
            storage.push({n: n.value, c: c.value});
            localStorage.setItem('nico_pro_db', JSON.stringify(storage));
            n.value = ''; c.value = ''; // Mawawala ang text pagka-save
            if(window.Android) window.Android.showMessage("Script Saved!");
            render();
        }

        function remove(i) {
            storage.splice(i, 1);
            localStorage.setItem('nico_pro_db', JSON.stringify(storage));
            render();
        }

        // EXECUTE FUNCTION NA MAY FEEDBACK
        function execute(code) {
            if(!code) return;
            if(window.Android) {
                // Tatawag sa Sketchware
                window.Android.startInjection(code);
                // Magpapakita ng confirmation toast
                window.Android.showMessage("Script Executed!");
            } else {
                alert("Executed: " + code.substring(0, 20) + "...");
            }
        }
        
        window.onload = render;
    </script>
</body>
                    </html>
